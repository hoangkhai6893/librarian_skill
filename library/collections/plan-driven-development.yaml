id: "plan-driven-development"
name: "Plan-Driven Development"
curator: "dkhai"
description: "Quy trinh phat trien day du voi planning nghiem tuc, architecture decisions, va execution co to chuc. Phu hop cho feature lon, refactor lon, hoac he thong phuc tap."
curator_notes: "Plan truoc, code sau. Collection nay tranh technical debt va re-work do thieu planning. architecture-decision-records quan trong cho decisons lon. gsd-planner giup chia nho task de execute. subagent-driven-development dung cho task co the chay song song."

entries:
  - id: "brainstorming"
    seq: 1
    role: "Kham pha problem space, constraints, trade-offs truoc khi commit vao approach nao"
    when: "Bat dau moi feature phuc tap hoac refactor quan trong"
    required: true

  - id: "architecture-decision-records"
    seq: 2
    role: "Document cac architectural decisions quan trong voi context, options, va rationale"
    when: "Khi co decision anh huong den cau truc he thong hoac khong de reverse"
    required: true

  - id: "writing-plans"
    seq: 3
    role: "Lap ke hoach chi tiet voi tasks, acceptance criteria, va dependencies"
    when: "Sau khi architecture da ro rang, truoc khi bat dau code"
    required: true

  - id: "gsd-planner"
    seq: 4
    role: "Agent tu dong chia plan thanh sub-tasks co the execute, estimate complexity"
    when: "Khi plan phuc tap voi nhieu dependencies hoac team member"
    required: false

  - id: "executing-plans"
    seq: 5
    role: "Thuc thi tung task theo plan, khong skip steps, khong improvise ngoai plan"
    when: "Khi bat dau implement"
    required: true

  - id: "subagent-driven-development"
    seq: 6
    role: "Chay nhieu tasks doc lap song song qua subagents de tang toc do"
    when: "Khi co nhieu task doc lap co the chay cung luc"
    required: false

  - id: "requesting-code-review"
    seq: 7
    role: "Review voi context day du ve plan goc va architectural decisions"
    when: "Khi implementation xong, truoc khi merge"
    required: true

  - id: "verification-before-completion"
    seq: 8
    role: "Xac nhan tat ca acceptance criteria da duoc dap ung, khong co regression"
    when: "Truoc khi close task hoac merge PR"
    required: true

tags: ["planning", "architecture", "workflow", "documentation"]
complexity: "intermediate"
project_types: ["any"]
applicable_phases: ["planning", "architecture", "development", "review"]
