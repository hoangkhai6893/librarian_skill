[pytest]
testpaths = test
pythonpath = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary on failure
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    slow: marks tests that take more than 1s (e.g. subprocess, real library)
    smoke: marks CLI smoke tests via subprocess
    real: marks tests that run against the real library (not fixtures)
